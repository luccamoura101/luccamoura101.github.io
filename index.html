<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lucca@dev:~</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --border:  #1e1e1e;
      --gold:    #ffd21e;
      --gold2:   #ffb800;
      --dim:     #555;
      --muted:   #888;
      --text:    #d4d0c8;
      --green:   #4ec94e;
      --red:     #e05454;
      --blue:    #5b9cf6;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    .window {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
    }

    /* ── TITLEBAR ── */
    .titlebar {
      flex-shrink: 0;
      background: #161616;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 42px;
      user-select: none;
    }

    .traffic-lights { display: flex; gap: 8px; margin-right: 16px; }
    .tl {
      width: 12px; height: 12px; border-radius: 50%;
      cursor: default;
    }
    .tl.red    { background: #ff5f57; }
    .tl.yellow { background: #ffbd2e; }
    .tl.green  { background: #28c840; }

    .titlebar-title {
      flex: 1; text-align: center;
      font-size: 12px; color: var(--dim); letter-spacing: 0.05em;
    }

    .titlebar-lang { display: flex; gap: 4px; }
    .tl-btn {
      background: none; border: 1px solid var(--border);
      color: var(--dim); font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 2px 8px; border-radius: 3px;
      cursor: pointer; transition: all .2s;
    }
    .tl-btn.active { border-color: var(--gold); color: var(--gold); }
    .tl-btn:hover:not(.active) { color: var(--text); border-color: #333; }

    /* ── TERMINAL OUTPUT ── */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      scroll-behavior: smooth;
    }
    .terminal::-webkit-scrollbar { width: 6px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    .line { margin-bottom: 2px; white-space: pre-wrap; word-break: break-word; }
    .gap    { margin-bottom: 14px; }
    .gap-sm { margin-bottom: 6px; }

    .c-gold  { color: var(--gold); }
    .c-green { color: var(--green); }
    .c-red   { color: var(--red); }
    .c-blue  { color: var(--blue); }
    .c-muted { color: var(--muted); }
    .c-dim   { color: var(--dim); }
    .bold    { font-weight: 700; }

    .ascii {
      color: var(--gold);
      font-size: 12px;
      line-height: 1.25;
      margin-bottom: 4px;
    }

    .prompt-line {
      display: flex; align-items: center;
      margin-top: 6px; margin-bottom: 2px;
    }
    .p-user   { color: var(--green); font-weight: 700; }
    .p-at     { color: var(--dim); }
    .p-host   { color: var(--blue); font-weight: 700; }
    .p-colon  { color: var(--dim); }
    .p-path   { color: var(--gold); }
    .p-dollar { color: var(--text); margin: 0 8px; }
    .p-cmd    { color: var(--text); }

    /* ── INPUT ROW ── */
    .input-row {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 32px;
      display: flex; align-items: center;
    }
    #cmd-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; color: var(--text);
      caret-color: var(--gold);
    }

    /* ── HINTS ── */
    .hints {
      flex-shrink: 0;
      padding: 8px 32px 14px;
      display: flex; flex-wrap: wrap; gap: 8px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .hint-label { font-size: 11px; color: var(--dim); align-self: center; margin-right: 4px; }
    .hint {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: 'JetBrains Mono', monospace;
      font-size: 11px; padding: 4px 12px; border-radius: 4px;
      cursor: pointer; transition: all .2s;
    }
    .hint:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,210,30,.04); }

    @media (max-width: 600px) {
      html, body { font-size: 12px; }
      .terminal { padding: 16px; }
      .input-row, .hints { padding-left: 16px; padding-right: 16px; }
      .ascii { font-size: 8px; }
    }
  </style>
</head>
<body>
<div class="window">

  <div class="titlebar">
    <div class="traffic-lights">
      <div class="tl red"></div>
      <div class="tl yellow"></div>
      <div class="tl green"></div>
    </div>
    <div class="titlebar-title">lucca@dev: ~</div>
    <div class="titlebar-lang">
      <button class="tl-btn active" onclick="setLang('en',this)">EN</button>
      <button class="tl-btn"        onclick="setLang('pt',this)">PT</button>
    </div>
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="input-row">
    <span class="p-user">lucca</span><span class="p-at">@</span><span class="p-host">dev</span><span class="p-colon">:</span><span class="p-path">~</span><span class="p-dollar">$</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command..." autofocus />
  </div>

  <div class="hints">
    <span class="hint-label">→</span>
    <button class="hint" onclick="runCmd('help')">help</button>
    <button class="hint" onclick="runCmd('about')">about</button>
    <button class="hint" onclick="runCmd('skills')">skills</button>
    <button class="hint" onclick="runCmd('projects')">projects</button>
    <button class="hint" onclick="runCmd('contact')">contact</button>
    <button class="hint" onclick="runCmd('clear')">clear</button>
  </div>

</div>
<script>
let lang = 'en';
let cmdHistory = [], histIdx = -1;
const term  = document.getElementById('terminal');
const input = document.getElementById('cmd-input');

// ── CONTENT ────────────────────────────────────────────────────
const T = {
  en: {
    welcome: [
      { t:'ascii', v:`  _    _   _  ___  ___  _    \n | |  | | | |/ __||  _|| |   \n | |__| |_| | (__ | |  | |__ \n |____|\\___/ \\___||_|  |____|` },
      { t:'line gap-sm c-muted', v:'Portfolio v1.0  —  CS student & developer' },
      { t:'line c-dim',          v:'─────────────────────────────────────────────' },
      { t:'line gap',            v:'' },
      { t:'line',                v:'Welcome! Type <span class="c-gold bold">help</span> to see available commands.' },
    ],
    help: [
      { t:'line gap-sm c-gold bold', v:'Available commands:' },
      { t:'line', v:'  <span class="c-gold">about</span>      —  Who I am' },
      { t:'line', v:'  <span class="c-gold">skills</span>     —  Technologies I use' },
      { t:'line', v:'  <span class="c-gold">projects</span>   —  Things I\'ve built' },
      { t:'line', v:'  <span class="c-gold">contact</span>    —  Get in touch' },
      { t:'line gap c-dim', v:'  clear      —  Clear terminal' },
      { t:'line c-dim', v:'  ↑ ↓ to navigate history  |  Tab to autocomplete' },
    ],
    about: [
      { t:'line gap-sm c-gold bold', v:'~/about' },
      { t:'line', v:"I'm <span class='c-gold bold'>Lucca</span>, a developer and Computer Science student." },
      { t:'line', v:'I build functional, accessible interfaces focused on user experience.' },
      { t:'line gap', v:"Always learning, always building — every project is a chance to grow." },
      { t:'line c-muted', v:'  📍 Brazil' },
      { t:'line c-muted', v:'  🎓 Computer Science — currently enrolled' },
    ],
    skills: [
      { t:'line gap-sm c-gold bold', v:'~/skills' },
      { t:'line', v:'  <span class="c-blue">Languages</span>    Python · HTML · CSS · JavaScript' },
      { t:'line', v:'  <span class="c-blue">Concepts</span>     Data Structures · Algorithms · OOP' },
      { t:'line gap', v:'  <span class="c-blue">Tools</span>        Git · GitHub · VS Code' },
      { t:'line c-dim', v:'  Always expanding this list...' },
    ],
    projects: [
      { t:'line gap-sm c-gold bold', v:'~/projects' },
      { t:'line c-green bold', v:'  [01]  Library Management System' },
      { t:'line c-muted',      v:'        Full-featured library system with cataloging,' },
      { t:'line c-muted gap-sm',v:'        user management, and lending operations.' },
      { t:'line c-dim gap',    v:'        Python · Data Structures · Algorithms' },
      { t:'line c-green bold', v:'  [02]  Vaccination Game  (SIR-Vax-Network)' },
      { t:'line c-muted',      v:'        Interactive simulation of disease spread and' },
      { t:'line c-muted gap-sm',v:'        vaccination strategies via network theory.' },
      { t:'line c-dim gap',    v:'        Python · Network Theory · Simulation' },
      { t:'line c-green bold', v:'  [03]  Minesweeper' },
      { t:'line c-muted',      v:'        Classic Minesweeper remake with modern graphics,' },
      { t:'line c-muted gap-sm',v:'        difficulty levels, and a custom interface.' },
      { t:'line c-dim',        v:'        Python · Game Logic · UI/UX' },
    ],
    contact: [
      { t:'line gap-sm c-gold bold', v:'~/contact' },
      { t:'line gap',  v:"I'm always open to new projects, ideas, or a quick hello." },
      { t:'line', v:'  <span class="c-blue">GitHub</span>      <a href="https://github.com/luccamoura101" target="_blank" style="color:var(--gold);text-decoration:none;">github.com/luccamoura101</a>' },
      { t:'line', v:'  <span class="c-blue">Email</span>       <a href="mailto:luccamoura101@gmail.com" style="color:var(--gold);text-decoration:none;">luccamoura101@gmail.com</a>' },
      { t:'line', v:'  <span class="c-blue">Instagram</span>   <a href="https://instagram.com/lucca_mourarantes" target="_blank" style="color:var(--gold);text-decoration:none;">@lucca_mourarantes</a>' },
    ],
    notFound: c => `<span class="c-red">command not found:</span> ${esc(c)}  —  type <span class="c-gold">help</span> for available commands.`,
  },

  pt: {
    welcome: [
      { t:'ascii', v:`  _    _   _  ___  ___  _    \n | |  | | | |/ __||  _|| |   \n | |__| |_| | (__ | |  | |__ \n |____|\\___/ \\___||_|  |____|` },
      { t:'line gap-sm c-muted', v:'Portfólio v1.0  —  Estudante de CC & desenvolvedor' },
      { t:'line c-dim',          v:'─────────────────────────────────────────────' },
      { t:'line gap',            v:'' },
      { t:'line',                v:'Bem-vindo! Digite <span class="c-gold bold">help</span> para ver os comandos disponíveis.' },
    ],
    help: [
      { t:'line gap-sm c-gold bold', v:'Comandos disponíveis:' },
      { t:'line', v:'  <span class="c-gold">about</span>      —  Quem sou eu' },
      { t:'line', v:'  <span class="c-gold">skills</span>     —  Tecnologias que uso' },
      { t:'line', v:'  <span class="c-gold">projects</span>   —  O que já construí' },
      { t:'line', v:'  <span class="c-gold">contact</span>    —  Entrar em contato' },
      { t:'line gap c-dim', v:'  clear      —  Limpar o terminal' },
      { t:'line c-dim', v:'  ↑ ↓ para navegar o histórico  |  Tab para autocompletar' },
    ],
    about: [
      { t:'line gap-sm c-gold bold', v:'~/sobre' },
      { t:'line', v:"Sou <span class='c-gold bold'>Lucca</span>, desenvolvedor e estudante de Ciência da Computação." },
      { t:'line', v:'Crio interfaces funcionais e acessíveis com foco na experiência do usuário.' },
      { t:'line gap', v:"Sempre aprendendo, sempre construindo — cada projeto é uma chance de crescer." },
      { t:'line c-muted', v:'  📍 Brasil' },
      { t:'line c-muted', v:'  🎓 Ciência da Computação — cursando' },
    ],
    skills: [
      { t:'line gap-sm c-gold bold', v:'~/habilidades' },
      { t:'line', v:'  <span class="c-blue">Linguagens</span>   Python · HTML · CSS · JavaScript' },
      { t:'line', v:'  <span class="c-blue">Conceitos</span>    Estruturas de Dados · Algoritmos · POO' },
      { t:'line gap', v:'  <span class="c-blue">Ferramentas</span>  Git · GitHub · VS Code' },
      { t:'line c-dim', v:'  Sempre expandindo essa lista...' },
    ],
    projects: [
      { t:'line gap-sm c-gold bold', v:'~/projetos' },
      { t:'line c-green bold', v:'  [01]  Sistema de Gerenciamento de Biblioteca' },
      { t:'line c-muted',      v:'        Sistema completo com catalogação,' },
      { t:'line c-muted gap-sm',v:'        gestão de usuários e operações de empréstimo.' },
      { t:'line c-dim gap',    v:'        Python · Estruturas de Dados · Algoritmos' },
      { t:'line c-green bold', v:'  [02]  Jogo de Vacinação  (SIR-Vax-Network)' },
      { t:'line c-muted',      v:'        Simulação interativa de propagação de doenças e' },
      { t:'line c-muted gap-sm',v:'        estratégias de vacinação via teoria de redes.' },
      { t:'line c-dim gap',    v:'        Python · Teoria de Redes · Simulação' },
      { t:'line c-green bold', v:'  [03]  Campo Minado' },
      { t:'line c-muted',      v:'        Remake clássico com gráficos modernos,' },
      { t:'line c-muted gap-sm',v:'        múltiplos níveis de dificuldade e interface personalizada.' },
      { t:'line c-dim',        v:'        Python · Lógica de Jogo · UI/UX' },
    ],
    contact: [
      { t:'line gap-sm c-gold bold', v:'~/contato' },
      { t:'line gap',  v:"Estou sempre aberto a novos projetos, ideias ou um simples oi." },
      { t:'line', v:'  <span class="c-blue">GitHub</span>      <a href="https://github.com/luccamoura101" target="_blank" style="color:var(--gold);text-decoration:none;">github.com/luccamoura101</a>' },
      { t:'line', v:'  <span class="c-blue">Email</span>       <a href="mailto:luccamoura101@gmail.com" style="color:var(--gold);text-decoration:none;">luccamoura101@gmail.com</a>' },
      { t:'line', v:'  <span class="c-blue">Instagram</span>   <a href="https://instagram.com/lucca_mourarantes" target="_blank" style="color:var(--gold);text-decoration:none;">@lucca_mourarantes</a>' },
    ],
    notFound: c => `<span class="c-red">comando não encontrado:</span> ${esc(c)}  —  digite <span class="c-gold">help</span> para ver os comandos.`,
  }
};

// ── UTILS ──────────────────────────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function appendLine(cls, html) {
  const el = document.createElement('div');
  // split class string and apply individually so gap / gap-sm work
  cls.split(' ').forEach(c => { if(c) el.classList.add(c); });
  el.innerHTML = html;
  term.appendChild(el);
}

function appendPromptEcho(cmd) {
  const el = document.createElement('div');
  el.className = 'prompt-line';
  el.innerHTML =
    `<span class="p-user">lucca</span><span class="p-at">@</span>` +
    `<span class="p-host">dev</span><span class="p-colon">:</span>` +
    `<span class="p-path">~</span><span class="p-dollar">$</span>` +
    `<span class="p-cmd"> ${esc(cmd)}</span>`;
  term.appendChild(el);
}

function printLines(lines) {
  lines.forEach(l => appendLine(l.t, l.v));
  // spacer
  appendLine('line', '');
  term.scrollTop = term.scrollHeight;
}

// ── COMMANDS ───────────────────────────────────────────────────
const CMDS = ['help','about','skills','projects','contact','clear'];

function runCmd(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;

  if (cmdHistory[0] !== cmd) cmdHistory.unshift(cmd);
  histIdx = -1;
  input.value = '';
  input.focus();

  const t = T[lang];

  if (cmd === 'clear') {
    term.innerHTML = '';
    return;
  }

  appendPromptEcho(cmd);

  if      (cmd === 'help')     printLines(t.help);
  else if (cmd === 'about')    printLines(t.about);
  else if (cmd === 'skills')   printLines(t.skills);
  else if (cmd === 'projects') printLines(t.projects);
  else if (cmd === 'contact')  printLines(t.contact);
  else {
    appendLine('line gap', t.notFound(cmd));
  }
}

// ── LANGUAGE ───────────────────────────────────────────────────
function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.tl-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  term.innerHTML = '';
  boot(false);
}

// ── BOOT ───────────────────────────────────────────────────────
function boot(animate) {
  const lines = T[lang].welcome;
  if (!animate) { printLines(lines); return; }

  let i = 0;
  function next() {
    if (i >= lines.length) return;
    const l = lines[i++];
    if (l.t === 'ascii') {
      const el = document.createElement('div');
      el.className = 'ascii';
      term.appendChild(el);
      const txt = l.v;
      let ci = 0;
      function typeChar() {
        if (ci < txt.length) {
          el.textContent += txt[ci++];
          term.scrollTop = term.scrollHeight;
          setTimeout(typeChar, 6);
        } else {
          setTimeout(next, 100);
        }
      }
      typeChar();
    } else {
      appendLine(l.t, l.v);
      term.scrollTop = term.scrollHeight;
      setTimeout(next, 80);
    }
  }
  next();
}

// ── KEYBOARD ───────────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    runCmd(input.value);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < cmdHistory.length - 1) histIdx++;
    input.value = cmdHistory[histIdx] ?? '';
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    histIdx > 0 ? histIdx-- : (histIdx = -1);
    input.value = histIdx >= 0 ? cmdHistory[histIdx] : '';
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const v = input.value.toLowerCase();
    const m = CMDS.find(c => c.startsWith(v) && c !== v);
    if (m) input.value = m;
  }
});

term.addEventListener('click', () => input.focus());

boot(true);
</script>
</body>
</html>
